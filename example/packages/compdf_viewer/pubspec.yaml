name: compdf_viewer
description: A full-featured PDF viewer Flutter package built on ComPDFKit, providing PDF reading, annotations, bookmarks, search, thumbnails, and more with GetX state management.
version: 0.0.2
publish_to: none
homepage: https://github.com/ComPDFKit/compdfkit-pdf-sdk-flutter
repository: https://github.com/ComPDFKit/compdfkit-pdf-sdk-flutter

environment:
  sdk: '>=3.0.5 <4.0.0'
  flutter: ">=3.3.0"

dependencies:
  flutter:
    sdk: flutter
  compdfkit_flutter:
    path: ../../../
  get: ^4.7.2
  share_plus: ^12.0.1
  flutter_colorpicker: ^1.1.0
  shared_preferences: ^2.5.3
  flutter_svg: ^2.1.0
  logger: ^2.5.0
  url_launcher: ^6.2.3
  file_picker: ^10.2.0
  path_provider: ^2.1.5
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

